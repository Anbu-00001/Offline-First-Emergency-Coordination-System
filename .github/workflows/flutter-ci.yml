name: Flutter CI
on:
  push:
    paths:
      - '**.dart'
      - 'pubspec.yaml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          cd mobile_app
          flutter pub get
      - run: |
          cd mobile_app
          flutter analyze
      - run: |
          cd mobile_app
          flutter test
