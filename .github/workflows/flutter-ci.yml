name: Flutter CI
on:
  push:
    paths:
      - '**.dart'
      - 'pubspec.yaml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      - run: |
          cd mobile_app
          flutter pub get
      - run: |
          cd mobile_app
          flutter analyze
      - run: |
          cd mobile_app
          flutter build apk --debug
